networks:
  app-network:
    driver: bridge

volumes:
  mssql_data:
  postgres_data:

services:
  # MS SQL Server
  mssql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-server
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app-network
    restart: unless-stopped

  # PostgreSQL для FastAPI
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1
      - POSTGRES_DB=EN_domain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d EN_domain"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  # ASP.NET Core бэкенд
  aspnet-backend:
    build:
      context: ./asp-backend      # Путь к папке с .NET проектом
      dockerfile: Dockerfile
    container_name: aspnet-backend
    environment:
      # Подключение к MS SQL (по имени сервиса) - пароль совпадает с SA_PASSWORD
      - ConnectionStrings__DefaultConnection=Server=mssql-server,1433;Database=redactor;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;Encrypt=True
      # URL для вызова FastAPI (по имени сервиса)
      - FastApi__BaseUrl=http://fastapi-backend:8000
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:8080"                   # Хост:Контейнер
    networks:
      - app-network
    depends_on:
      mssql-server:
        condition: service_healthy
      fastapi-backend:
        condition: service_started
    restart: unless-stopped

  # FastAPI бэкенд
  fastapi-backend:
    build:
      context: ./fastapi-backend      # Путь к папке с FastAPI проектом
      dockerfile: Dockerfile
    container_name: fastapi-backend
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=EN_domain
      - DB_USER=postgres
      - DB_PASSWORD=1
    ports:
      - "8000:8000"                   # Хост:Контейнер
    networks:
      - app-network
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped
